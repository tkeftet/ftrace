# Render blueprint — deploys the backend (Node web service) and the frontend
# (static site) as two separate services from this monorepo.
#
# After the first deploy, confirm the generated URLs in the Render dashboard.
# If a service name was taken, Render appends a suffix (e.g. ftrace-backend-xyz)
# and you must update the three cross-referencing URLs below to match:
#   - backend  CORS_ORIGIN          -> the frontend URL
#   - frontend VITE_API_BASE_URL    -> the backend URL + /api
#   - frontend VITE_SOCKET_URL      -> the backend URL
#
# Secrets are marked `sync: false`: Render will prompt for them on deploy and
# never store them in this file / git. Fill them in the dashboard.

services:
  # ── Backend: Express + Socket.io API ──────────────────────────────────────
  - type: web
    name: ftrace-backend
    runtime: node
    rootDir: backend
    plan: free
    region: frankfurt
    # --include=dev forces devDependencies (typescript, @types/*) to install even
    # though NODE_ENV=production would otherwise make npm omit them. The build
    # needs them; the runtime (npm start -> node dist) does not.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically — the app reads process.env.PORT.
      # Apex domain entry auto-allows every tenant subdomain (cors.ts matches
      # host.endsWith('.doomedgamesstudio.com')). The onrender URL is kept so the
      # default Render frontend still works during DNS propagation / testing.
      - key: CORS_ORIGIN
        value: https://doomedgamesstudio.com,https://ftrace-frontend.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false

  # ── Frontend: Vite SPA served as a static site ────────────────────────────
  # A static site is the correct Render primitive for a `vite build` output:
  # free, CDN-backed, and the rewrite rule below makes client-side routing work
  # on hard refresh / deep links. The VITE_* vars are baked in at BUILD time.
  - type: web
    name: ftrace-frontend
    runtime: static
    rootDir: frontend
    # --include=dev: vite, typescript and plugins live in devDependencies and are
    # required to build, so force them in regardless of any production omit.
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ftrace-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://ftrace-backend.onrender.com
      # Apex domain for multi-tenant subdomain resolution (utils/tenant.ts):
      # riad21.doomedgamesstudio.com -> slug "riad21". Baked in at build time,
      # so changing it requires a frontend rebuild. Requires the wildcard custom
      # domain + DNS to be set up on this service (see notes below).
      - key: VITE_BASE_DOMAIN
        value: doomedgamesstudio.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
